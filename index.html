<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeMatch</title>
    <meta name="description" content="Analyze your resume against any job description and get AI-powered keyword scoring and targeted bullet rewrites." />

    <!-- Open Graph (LinkedIn, Facebook, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://resumematchapp.com" />
    <meta property="og:title" content="ResumeMatch" />
    <meta property="og:description" content="Analyze your resume against any job description and get AI-powered keyword scoring and targeted bullet rewrites." />
    <meta property="og:image" content="https://resumematchapp.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ResumeMatch" />
    <meta name="twitter:description" content="Analyze your resume against any job description and get AI-powered keyword scoring and targeted bullet rewrites." />
    <meta name="twitter:image" content="https://resumematchapp.com/og-image.png" />
  </head>
  <body>
    <script>
      (function(){var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
